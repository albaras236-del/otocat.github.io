<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kopi Kuba</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <div class="login-page" style="min-height:100vh;">
    <div class="login-container">
      <div class="login-icon">☕</div>
      <h2>Selamat Datang</h2>
      <p>Masuk ke akun Kopi Kuba Anda</p>
      <div id="login-msg" class="login-msg"></div>

      <form id="loginForm" action="index.html" method="get" onsubmit="return validateLogin()">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required>
        </div>
        <div class="login-options">
          <div class="checkbox-group">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Ingat saya</label>
          </div>
          <a class="forgot-link" href="#">Lupa Password?</a>
        </div>
        <button type="submit" class="btn-login">Masuk</button>
      </form>

      <div class="login-footer">
        Belum punya akun? <a href="register.html">Daftar di sini</a>
      </div>
      <div style="margin-top:16px;">
        <a href="index.html" style="color:var(--accent);text-decoration:none;font-size:14px;">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

<form id="registerForm" onsubmit="return handleRegister()" style="display:none;">
  <div class="form-group">
    <label for="reg-name">Nama Lengkap</label>
    <input type="text" id="reg-name" required>
  </div>
  <div class="form-group">
    <label for="reg-email">Email</label>
    <input type="email" id="reg-email" required>
  </div>
  <div class="form-group">
    <label for="reg-password">Password</label>
    <input type="password" id="reg-password" required>
  </div>
  <div class="form-group">
    <label for="reg-confirm">Konfirmasi Password</label>
    <input type="password" id="reg-confirm" required>
  </div>
  <button type="submit" class="btn-login">Daftar</button>
</form>
